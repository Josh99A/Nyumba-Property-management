<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nyumba keeps properties, rent, tenants, maintenance, and listings available wherever you work.">
  <meta name="theme-color" content="#123A6F">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nyumba">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nyumba Property Management</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Brand boot splash. Painted by the browser the instant the page loads, so
    the user sees Nyumba while the Flutter engine downloads and starts up
    rather than a blank page. It removes itself once Flutter paints its first
    frame (see the script below), handing off to the in-app splash seamlessly.
  -->
  <style>
    :root {
      --nyumba-bg: #F7F4ED;
      /* The plate tracks the background so it stays invisible in both themes,
         leaving only a soft lift. The mark below is theme-aware and draws its
         own contrast against this surface. */
      --nyumba-plate: var(--nyumba-bg);
      --nyumba-navy: #123A6F;
      --nyumba-sage: #5F8F6B;
      --nyumba-gold: #C98B2E;
    }
    @media (prefers-color-scheme: dark) {
      :root { --nyumba-bg: #0F1620; --nyumba-navy: #A7C2E8; --nyumba-sage: #7FAF8B; }
    }
    #nyumba-splash {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--nyumba-bg);
      transition: opacity .3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #nyumba-splash.nyumba-hide { opacity: 0; pointer-events: none; }
    #nyumba-splash .nyumba-plate {
      background: var(--nyumba-plate);
      border-radius: 28px;
      padding: 26px 30px;
      box-shadow: 0 12px 32px rgba(18, 58, 111, 0.10);
      animation: nyumba-pop .55s ease both;
    }
    /* Code-native brand lockup, matching the in-app NyumbaLogo widget and app
       icon: the "document under a roof" mark (navy roof with chimney, gable
       window, sage checklist document, gold folded corner) beside the
       wordmark. Geometry mirrors _NyumbaMarkPainter. */
    #nyumba-splash .nyumba-lockup {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #nyumba-splash .nyumba-mark {
      width: 88px;
      height: 88px;
      max-width: 22vw;
      display: block;
      flex: none;
    }
    #nyumba-splash .nyumba-words {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }
    #nyumba-splash .nyumba-name {
      color: var(--nyumba-navy);
      font: 800 41px/0.95 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      letter-spacing: -0.6px;
    }
    #nyumba-splash .nyumba-sub {
      margin-top: 7px;
      color: var(--nyumba-sage);
      font: 700 11px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      letter-spacing: 2.2px;
    }
    #nyumba-splash .nyumba-dots {
      position: absolute;
      bottom: 52px;
      display: flex;
      gap: 7px;
    }
    #nyumba-splash .nyumba-dots span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      opacity: 0;
      animation: nyumba-appear .4s ease .5s forwards, nyumba-wave 1.1s ease-in-out .5s infinite;
    }
    #nyumba-splash .nyumba-dots span:nth-child(1) { background: var(--nyumba-sage); animation-delay: .5s, .5s; }
    #nyumba-splash .nyumba-dots span:nth-child(2) { background: var(--nyumba-navy); animation-delay: .5s, .68s; }
    #nyumba-splash .nyumba-dots span:nth-child(3) { background: var(--nyumba-gold); animation-delay: .5s, .86s; }
    @keyframes nyumba-pop { from { opacity: 0; transform: scale(.94) translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes nyumba-appear { to { opacity: 1; } }
    @keyframes nyumba-wave {
      0%, 100% { transform: scale(.62); opacity: .4; }
      50% { transform: scale(1); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      #nyumba-splash .nyumba-plate,
      #nyumba-splash .nyumba-dots span { animation: none; opacity: 1; transform: none; }
    }
  </style>
  <div id="nyumba-splash">
    <div class="nyumba-plate">
      <div class="nyumba-lockup" role="img" aria-label="Nyumba Property Management">
        <svg class="nyumba-mark" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g stroke-linecap="round" stroke-linejoin="round">
            <path d="M22.18 44.27 L22.18 87.97 Q22.18 91.24 27.09 91.24 L57.36 91.24" stroke="var(--nyumba-sage)" stroke-width="4.91"/>
            <path d="M80.27 44.27 L80.27 72.58" stroke="var(--nyumba-sage)" stroke-width="4.91"/>
            <path d="M41.82 54.09 L67.18 54.09" stroke="var(--nyumba-sage)" stroke-width="3.60"/>
            <path d="M41.82 64.73 L67.18 64.73" stroke="var(--nyumba-sage)" stroke-width="3.60"/>
            <path d="M41.82 74.87 L59.00 74.87" stroke="var(--nyumba-sage)" stroke-width="3.60"/>
            <path d="M14.82 38.87 L50 8.27 L84.69 38.06" stroke="var(--nyumba-navy)" stroke-width="13.09"/>
          </g>
          <circle cx="34.45" cy="54.09" r="2.45" fill="var(--nyumba-sage)"/>
          <circle cx="34.45" cy="64.73" r="2.45" fill="var(--nyumba-sage)"/>
          <circle cx="34.45" cy="74.87" r="2.45" fill="var(--nyumba-sage)"/>
          <path d="M63.91 76.18 L82.73 76.18 L63.91 94.18 Z" fill="var(--nyumba-gold)"/>
          <rect x="70.95" y="15.96" width="7.20" height="14.40" rx="1" fill="var(--nyumba-navy)"/>
          <rect x="43.45" y="29.87" width="4.91" height="5.40" rx="1" fill="var(--nyumba-navy)"/>
          <rect x="50.82" y="29.87" width="4.91" height="5.40" rx="1" fill="var(--nyumba-navy)"/>
          <rect x="43.45" y="38.55" width="4.91" height="5.40" rx="1" fill="var(--nyumba-navy)"/>
          <rect x="50.82" y="38.55" width="4.91" height="5.40" rx="1" fill="var(--nyumba-navy)"/>
        </svg>
        <div class="nyumba-words">
          <span class="nyumba-name">Nyumba</span>
          <span class="nyumba-sub">PROPERTY MANAGEMENT</span>
        </div>
      </div>
    </div>
    <div class="nyumba-dots"><span></span><span></span><span></span></div>
  </div>
  <script>
    (function () {
      var removed = false;
      function dismissSplash() {
        if (removed) return;
        removed = true;
        var splash = document.getElementById('nyumba-splash');
        if (!splash) return;
        splash.classList.add('nyumba-hide');
        splash.addEventListener('transitionend', function () {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        });
        // Fallback removal in case the transition never fires.
        setTimeout(function () {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        }, 700);
      }
      // Flutter dispatches this once its first frame is on screen.
      window.addEventListener('flutter-first-frame', dismissSplash);
    })();
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
