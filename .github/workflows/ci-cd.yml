name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.44.2

permissions:
  contents: read

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Recreate lib/firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

  deploy-web:
    name: Deploy web to Firebase Hosting
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Recreate lib/firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - run: flutter pub get

      - run: flutter build web --release

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: nyumba-property-management
          channelId: live

  build-android:
    name: Build Android APK
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Recreate lib/firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Recreate android/app/google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: nyumba-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    name: Build iOS app (unsigned IPA)
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Recreate lib/firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - run: flutter pub get

      - run: flutter build ios --release --no-codesign

      # No Apple signing certificates are configured, so package the .app
      # into an unsigned .ipa. It cannot be installed on devices until it
      # is signed (e.g. resigned locally or built with certs on this runner).
      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa-staging/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa-staging/Payload/
          cd build/ios/ipa-staging
          zip -qr ../../../nyumba-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: nyumba-ipa
          path: nyumba-unsigned.ipa
          if-no-files-found: error

  release:
    name: Attach binaries to GitHub release
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            nyumba-unsigned.ipa
