name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.44.2

permissions:
  contents: read

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Recreate lib/firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

  backend:
    name: Backend unit, rules & emulator tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # Runs against the emulator on a throwaway project id, so no credentials
      # are needed and nothing can touch a real environment. This is what
      # actually exercises firestore.rules and storage.rules.
      - name: Rules and command integration tests
        run: npm run test:emulator

  deploy-web:
    name: Deploy web to Firebase Hosting
    needs: [test, backend]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Recreate lib/firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - run: flutter pub get

      # Both values are public by design — they ship inside the web bundle —
      # but they are environment-specific, so they live here next to the
      # project this workflow deploys to (nyumba-property-management), not in
      # lib/ or firebase/. A staging/production workflow must carry its own.
      # reCAPTCHA activates App Check attestation; the VAPID key enables web
      # push subscription. Omitting either silently disables that feature.
      - run: >
          flutter build web --release
          --dart-define=NYUMBA_RECAPTCHA_V3_SITE_KEY=6LdRlVYtAAAAAKAkcfXuHygDKDSt3vJyG2ENw_oB
          --dart-define=NYUMBA_VAPID_PUBLIC_KEY=BKQYbVoQQawYMdYbHLSuiozTWxQZXdzZ2C6k_uzUqoHfMOFwCuYhiCx2gxK2Y5IT0RWjR4k5fB9YSGim82SKsys

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: nyumba-property-management
          channelId: live

  deploy-backend:
    name: Deploy rules, indexes & functions
    needs: [test, backend]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - run: npm ci
        working-directory: firebase/functions

      # Written outside the workspace so a later step cannot pick it up as a
      # build input, and removed regardless of outcome below.
      - name: Write deploy credentials
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/service-account.json"
          cat <<'CREDENTIALS' > "$RUNNER_TEMP/service-account.json"
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          CREDENTIALS

      # Rules, indexes, and functions were previously never deployed by CI, so
      # the security boundary in this repository could silently differ from the
      # one actually enforced in the project.
      #
      # Needs a service account with Firebase Admin, Cloud Functions Admin, and
      # Service Account User on nyumba-property-management.
      # Invoked through the binary `npm ci` installed above, so the deploy runs
      # the exact firebase-tools version pinned in functions/package-lock.json
      # rather than whatever npx resolves at run time.
      - name: Deploy
        run: functions/node_modules/.bin/firebase deploy --only firestore:rules,firestore:indexes,storage,functions --project nyumba-property-management --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json

      - name: Remove deploy credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/service-account.json"

  build-android:
    name: Build Android APK
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Recreate lib/firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Recreate android/app/google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: nyumba-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    name: Build iOS app (unsigned IPA)
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Recreate lib/firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - run: flutter pub get

      - run: flutter build ios --release --no-codesign

      # No Apple signing certificates are configured, so package the .app
      # into an unsigned .ipa. It cannot be installed on devices until it
      # is signed (e.g. resigned locally or built with certs on this runner).
      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa-staging/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa-staging/Payload/
          cd build/ios/ipa-staging
          zip -qr ../../../nyumba-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: nyumba-ipa
          path: nyumba-unsigned.ipa
          if-no-files-found: error

  release:
    name: Attach binaries to GitHub release
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            nyumba-unsigned.ipa
